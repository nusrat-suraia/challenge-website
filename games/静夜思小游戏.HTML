<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌙 古诗小游戏 · 静夜思</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: '微软雅黑', '华文楷体', 'KaiTi', 'Segoe UI', cursive, sans-serif;
        }
        
        body {
            background: linear-gradient(145deg, #1b2f4b 0%, #2c4a6e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }
        
        .game-container {
            max-width: 700px;
            width: 100%;
            background: #fef7e6;
            background-image: radial-gradient(circle at 30% 40%, #fff3d1 5%, transparent 15%),
                              radial-gradient(circle at 80% 70%, #ffecbc 8%, transparent 20%);
            border-radius: 70px 70px 50px 50px;
            box-shadow: 0 25px 30px rgba(0, 0, 0, 0.5), 0 10px 0 #9b7b5b;
            border: 6px solid #dbb486;
            position: relative;
            overflow: hidden;
        }
        
        /* 月亮装饰 */
        .game-container::before {
            content: "🌙";
            position: absolute;
            top: 15px;
            right: 30px;
            font-size: 4rem;
            opacity: 0.3;
            transform: rotate(10deg);
            pointer-events: none;
        }
        
        .game-container::after {
            content: "✨✨✨";
            position: absolute;
            bottom: 30px;
            left: 20px;
            font-size: 2.5rem;
            opacity: 0.2;
            transform: rotate(-5deg);
            pointer-events: none;
        }
        
        .header {
            background: #e4c9a9;
            background-image: linear-gradient(135deg, #f3e0c0 0%, #dbb68c 100%);
            padding: 25px 15px 20px;
            text-align: center;
            border-bottom: 8px solid #b58b5a;
            position: relative;
        }
        
        .header h1 {
            font-size: 3.2rem;
            font-weight: 900;
            color: #3e2b14;
            text-shadow: 3px 3px 0 #ffdfa7, 5px 5px 0 #9f7c4b;
            letter-spacing: 5px;
            margin-bottom: 5px;
        }
        
        .header h2 {
            font-size: 2.2rem;
            background: #9f7e55;
            display: inline-block;
            padding: 8px 35px;
            border-radius: 50px;
            color: #fff2d4;
            border: 4px solid #ffdead;
            box-shadow: 0 6px 0 #6a4f30;
            font-family: '华文楷体', 'KaiTi', serif;
        }
        
        .game-area {
            padding: 25px 20px 30px;
            background: #fff5e0;
        }
        
        .status-box {
            background: #dbbd96;
            border: 6px dashed #b07d4a;
            border-radius: 60px;
            padding: 15px 25px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: inset 0 4px 8px #8f7353;
        }
        
        .status-icon {
            font-size: 3.5rem;
            background: #f7e1b3;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 5px solid #b87e44;
            box-shadow: 0 6px 0 #7b562c;
        }
        
        .score-box {
            font-size: 2rem;
            font-weight: bold;
            color: #3f2c12;
            background: #fff2cf;
            padding: 10px 30px;
            border-radius: 50px;
            border: 4px solid #b87e44;
            flex: 1;
            text-align: center;
        }
        
        .question-box {
            background: #f7e9d2;
            border-radius: 80px 80px 50px 50px;
            padding: 30px 20px 25px;
            border: 6px solid #ca9f6b;
            margin-bottom: 20px;
            box-shadow: inset 0 0 0 3px #ffeac1;
        }
        
        .image-prompt {
            text-align: center;
            margin-bottom: 30px;
            background: #d9c09e;
            border-radius: 50px;
            padding: 25px 15px;
            border: 5px solid #b28952;
            box-shadow: 0 8px 0 #7b5d38;
        }
        
        .image-emoji {
            font-size: 7rem;
            line-height: 1.3;
            filter: drop-shadow(8px 10px 2px #6b4f30);
            animation: float 3s infinite ease-in-out;
        }
        
        .image-hint {
            font-size: 1.8rem;
            color: #3e2a12;
            margin-top: 10px;
            background: #fff2d1;
            display: inline-block;
            padding: 8px 30px;
            border-radius: 40px;
            border: 3px solid #b47a40;
        }
        
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 15px 0;
        }
        
        .option-card {
            background: #fff2c9;
            border: 5px solid #c28b4b;
            border-radius: 60px;
            padding: 18px 25px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 8px 0 #8b5929;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .option-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 0 #8b5929;
            background: #fff9e0;
        }
        
        .option-card:active {
            transform: translateY(6px);
            box-shadow: 0 4px 0 #8b5929;
        }
        
        .option-number {
            background: #c28b4b;
            color: white;
            font-size: 2rem;
            font-weight: bold;
            width: 55px;
            height: 55px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 4px solid #ffdd9e;
            box-shadow: 0 4px 0 #6b401e;
        }
        
        .option-text {
            font-size: 2rem;
            font-weight: 600;
            color: #422f14;
            flex: 1;
            font-family: '华文楷体', 'KaiTi', serif;
            letter-spacing: 2px;
        }
        
        .feedback-area {
            background: #7b623e;
            border-radius: 60px;
            padding: 25px;
            margin-top: 20px;
            min-height: 160px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 8px solid #dba160;
        }
        
        .feedback-content {
            text-align: center;
            width: 100%;
        }
        
        .feedback-emoji {
            font-size: 5rem;
            line-height: 1.3;
            filter: drop-shadow(4px 6px 0 #48351d);
        }
        
        .feedback-message {
            font-size: 2rem;
            color: #fff0bf;
            margin-top: 10px;
            background: #9c7c50;
            padding: 12px 20px;
            border-radius: 50px;
            border: 3px solid #fdcb89;
            font-weight: bold;
        }
        
        .restart-btn {
            background: #e3a468;
            border: none;
            color: #2c1b09;
            font-size: 2.2rem;
            font-weight: bold;
            padding: 18px 20px;
            border-radius: 70px;
            width: 100%;
            cursor: pointer;
            box-shadow: 0 12px 0 #9f621f;
            border: 6px solid #ffd79c;
            margin-top: 20px;
            transition: 0.05s linear;
            letter-spacing: 3px;
        }
        
        .restart-btn:active {
            transform: translateY(12px);
            box-shadow: 0 2px 0 #9f621f;
        }
        
        .footer {
            background: #dbb68c;
            text-align: center;
            padding: 15px;
            font-size: 1.8rem;
            border-top: 7px solid #b07d47;
            color: #38240c;
            font-weight: 600;
        }
        
        .poem-line {
            font-family: '华文楷体', 'KaiTi', serif;
            background: #ffe2b0;
            display: inline-block;
            padding: 5px 20px;
            border-radius: 30px;
            margin: 5px 0;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }
        
        .finish-emoji {
            font-size: 6rem;
            filter: drop-shadow(6px 8px 0 #4b3419);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>📜 古诗小游戏</h1>
            <h2>《静夜思》· 李白</h2>
        </div>
        
        <div class="game-area">
            <!-- 状态栏 -->
            <div class="status-box">
                <div class="status-icon" id="statusIcon">🌙</div>
                <div class="score-box" id="scoreText">第 1 / 4 题</div>
            </div>
            
            <!-- 题目区 -->
            <div class="question-box" id="questionBox">
                <div class="image-prompt" id="imagePrompt">
                    <div class="image-emoji" id="imageEmoji">🌙🏠</div>
                    <div class="image-hint" id="imageHint">这张图表现的是？</div>
                </div>
                <div class="options-grid" id="optionsContainer"></div>
            </div>
            
            <!-- 反馈区 -->
            <div class="feedback-area" id="feedbackArea">
                <div class="feedback-content" id="feedbackContent">
                    <div class="feedback-emoji">✨</div>
                    <div class="feedback-message">点一点选项，选择正确的诗句</div>
                </div>
            </div>
            
            <!-- 重玩按钮 -->
            <button class="restart-btn" id="restartBtn">🔄 重新开始</button>
        </div>
        
        <div class="footer">
            🌙 床前明月光 · 疑是地上霜 · 举头望明月 · 低头思故乡 🌙
        </div>
    </div>

    <script>
        // 《静夜思》全诗
        const POEM = [
            "床前明月光",
            "疑是地上霜",
            "举头望明月",
            "低头思故乡"
        ];
        
        // 题库 - 每道题包含：图片表情、图片描述、选项数组、正确答案索引
        const questions = [
            {
                imageEmoji: "🛏️🌙✨",
                imageHint: "月光照在床前",
                options: [
                    "举头望明月",
                    "床前明月光",
                    "低头思故乡",
                    "疑是地上霜"
                ],
                correctIndex: 1,  // 床前明月光
                explanation: "月光洒在床前，就像这首诗的第一句"
            },
            {
                imageEmoji: "❄️👻🌫️",
                imageHint: "地上好像结了霜",
                options: [
                    "床前明月光",
                    "低头思故乡",
                    "疑是地上霜",
                    "举头望明月"
                ],
                correctIndex: 2,  // 疑是地上霜
                explanation: "月光洁白，让人以为是地上的霜"
            },
            {
                imageEmoji: "🙆‍♂️🌙👀",
                imageHint: "抬起头看着月亮",
                options: [
                    "疑是地上霜",
                    "低头思故乡",
                    "床前明月光",
                    "举头望明月"
                ],
                correctIndex: 3,  // 举头望明月
                explanation: "抬起头，望着夜空的明月"
            },
            {
                imageEmoji: "😔🏠💭",
                imageHint: "低下头想起家乡",
                options: [
                    "低头思故乡",
                    "举头望明月",
                    "床前明月光",
                    "疑是地上霜"
                ],
                correctIndex: 0,  // 低头思故乡
                explanation: "低下头，思念起远方的故乡"
            }
        ];
        
        // 游戏状态
        let currentQuestionIndex = 0;
        let score = 0;
        let gameFinished = false;
        let answered = false;  // 当前题目是否已经回答过
        
        // DOM元素
        const statusIcon = document.getElementById('statusIcon');
        const scoreText = document.getElementById('scoreText');
        const imageEmoji = document.getElementById('imageEmoji');
        const imageHint = document.getElementById('imageHint');
        const optionsContainer = document.getElementById('optionsContainer');
        const feedbackContent = document.getElementById('feedbackContent');
        const restartBtn = document.getElementById('restartBtn');
        
        // 更新UI
        function renderQuestion() {
            if (gameFinished) {
                // 游戏完成状态
                statusIcon.innerText = '🏆';
                scoreText.innerText = `恭喜！全对！`;
                imageEmoji.innerText = '📜✨🌙';
                imageHint.innerText = '你背完了《静夜思》！';
                optionsContainer.innerHTML = '';
                
                feedbackContent.innerHTML = `
                    <div class="feedback-emoji finish-emoji">🏆🌙✨</div>
                    <div class="feedback-message">太棒了！你学会了《静夜思》！</div>
                `;
                return;
            }
            
            const q = questions[currentQuestionIndex];
            
            // 更新状态
            const icons = ['🌙', '❄️', '🙆', '😔'];
            statusIcon.innerText = icons[currentQuestionIndex] || '🌙';
            scoreText.innerText = `第 ${currentQuestionIndex + 1} / 4 题`;
            
            // 更新图片区
            imageEmoji.innerText = q.imageEmoji;
            imageHint.innerText = q.imageHint;
            
            // 生成选项
            let optionsHtml = '';
            q.options.forEach((option, index) => {
                const letters = ['A', 'B', 'C', 'D'];
                optionsHtml += `
                    <div class="option-card" data-index="${index}">
                        <div class="option-number">${letters[index]}</div>
                        <div class="option-text">${option}</div>
                    </div>
                `;
            });
            optionsContainer.innerHTML = optionsHtml;
            
            // 重置反馈区（如果还没有回答过）
            if (!answered) {
                feedbackContent.innerHTML = `
                    <div class="feedback-emoji">✨</div>
                    <div class="feedback-message">哪一句最符合这张图？</div>
                `;
            }
            
            // 绑定选项点击事件
            document.querySelectorAll('.option-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    if (gameFinished || answered) return;  // 已经回答过就不能再选
                    const index = parseInt(card.dataset.index);
                    handleAnswer(index);
                });
            });
        }
        
        // 处理答案
        function handleAnswer(selectedIndex) {
            if (gameFinished || answered) return;
            
            const q = questions[currentQuestionIndex];
            const isCorrect = (selectedIndex === q.correctIndex);
            
            answered = true;
            
            if (isCorrect) {
                score++;
                
                // 显示正确反馈
                feedbackContent.innerHTML = `
                    <div class="feedback-emoji">✅🌙✨</div>
                    <div class="feedback-message">正确！${q.explanation}</div>
                `;
            } else {
                // 显示错误反馈 - 给出正确答案
                const correctOption = q.options[q.correctIndex];
                feedbackContent.innerHTML = `
                    <div class="feedback-emoji">❌😔</div>
                    <div class="feedback-message">不对哦！正确答案是：“${correctOption}”</div>
                `;
            }
            
            // 1.2秒后进入下一题
            setTimeout(() => {
                if (currentQuestionIndex < questions.length - 1) {
                    // 下一题
                    currentQuestionIndex++;
                    answered = false;
                    renderQuestion();
                } else {
                    // 游戏结束
                    gameFinished = true;
                    renderQuestion();
                }
            }, 1200);
        }
        
        // 重置游戏
        function resetGame() {
            currentQuestionIndex = 0;
            score = 0;
            gameFinished = false;
            answered = false;
            renderQuestion();
        }
        
        // 绑定重置按钮
        restartBtn.addEventListener('click', resetGame);
        
        // 初始化
        renderQuestion();
    </script>
</body>
</html>
