<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎤 诗词接龙 · 静夜思</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: '微软雅黑', '华文楷体', 'KaiTi', sans-serif; }
        body { background: linear-gradient(145deg, #3f6173 0%, #537d93 100%); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 15px; }
        .game-container { max-width: 700px; width: 100%; background: #f5efe1; border-radius: 60px; box-shadow: 0 20px 30px rgba(0,0,0,0.5); border: 6px solid #ad8b67; overflow: hidden; }
        .header { background: #7f9a8c; padding: 25px; text-align: center; border-bottom: 6px solid #4d665a; }
        .header h1 { font-size: 3rem; color: #fff7e0; text-shadow: 3px 3px 0 #3b4f45; }
        .game-area { padding: 30px 25px; background: #fff8ea; }
        .current-line { background: #dcd0b7; border-radius: 60px; padding: 30px; text-align: center; font-size: 3rem; font-family: '华文楷体', serif; border: 6px solid #b19263; margin-bottom: 30px; box-shadow: inset 0 4px 8px #aa8d61; }
        .next-question { font-size: 2rem; color: #5f4d31; margin-bottom: 15px; text-align: center; }
        .options { display: flex; flex-direction: column; gap: 15px; margin: 25px 0; }
        .option-btn { background: #f0cf9f; border: 5px solid #b87e44; border-radius: 60px; padding: 20px; font-size: 2rem; text-align: center; cursor: pointer; box-shadow: 0 7px 0 #7b542d; transition: 0.1s; font-family: '华文楷体', serif; }
        .option-btn:hover { transform: translateY(-3px); box-shadow: 0 10px 0 #7b542d; background: #ffe5b9; }
        .option-btn:active { transform: translateY(5px); box-shadow: 0 3px 0 #7b542d; }
        .feedback { background: #617a63; color: white; padding: 20px; border-radius: 40px; font-size: 1.8rem; text-align: center; border: 5px solid #f5bc7a; margin-top: 20px; }
        .restart-btn { background: #b1844c; border: none; color: white; font-size: 2rem; padding: 15px; border-radius: 50px; width: 100%; cursor: pointer; box-shadow: 0 8px 0 #6e4b22; margin-top: 20px; border: 4px solid #ffbc73; }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header"><h1>🎤 诗词接龙 · 静夜思</h1></div>
        <div class="game-area">
            <div class="current-line" id="currentLine">床前明月光</div>
            <div class="next-question">❓ 下一句是？</div>
            <div class="options" id="optionsContainer"></div>
            <div class="feedback" id="feedbackMessage">点击选择正确的下一句</div>
            <button class="restart-btn" id="restartBtn">🔄 重新开始</button>
        </div>
    </div>
    <script>
        const poem = ["床前明月光", "疑是地上霜", "举头望明月", "低头思故乡"];
        let currentIndex = 0;
        let gameActive = true;
        
        function loadQuestion() {
            if (currentIndex >= poem.length - 1) {
                document.getElementById('currentLine').innerText = '🎉 完成！';
                document.getElementById('optionsContainer').innerHTML = '';
                document.getElementById('feedbackMessage').innerText = '你背完了整首诗！';
                return;
            }
            
            document.getElementById('currentLine').innerText = poem[currentIndex];
            
            // 生成选项：一个正确，三个随机错误
            const correct = poem[currentIndex + 1];
            const others = poem.filter((_, i) => i !== currentIndex + 1);
            const shuffled = [correct, ...others.sort(() => 0.5 - Math.random()).slice(0, 3)];
            const finalOptions = shuffled.sort(() => 0.5 - Math.random());
            
            let opts = '';
            finalOptions.forEach(opt => {
                opts += `<div class="option-btn" data-option="${opt}">${opt}</div>`;
            });
            document.getElementById('optionsContainer').innerHTML = opts;
            
            document.querySelectorAll('.option-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    if (!gameActive) return;
                    const selected = btn.dataset.option;
                    if (selected === correct) {
                        document.getElementById('feedbackMessage').innerHTML = '✅ 正确！';
                        currentIndex++;
                        if (currentIndex >= poem.length - 1) {
                            document.getElementById('feedbackMessage').innerHTML = '🎉 太棒了！你接龙成功！';
                        }
                        setTimeout(() => loadQuestion(), 800);
                    } else {
                        document.getElementById('feedbackMessage').innerHTML = `❌ 不对哦，下一句是 “${correct}”`;
                        gameActive = false;
                        setTimeout(() => {
                            gameActive = true;
                            loadQuestion();
                        }, 1500);
                    }
                });
            });
        }
        
        document.getElementById('restartBtn').addEventListener('click', () => {
            currentIndex = 0;
            gameActive = true;
            loadQuestion();
            document.getElementById('feedbackMessage').innerText = '点击选择正确的下一句';
        });
        
        loadQuestion();
    </script>
</body>
</html>
